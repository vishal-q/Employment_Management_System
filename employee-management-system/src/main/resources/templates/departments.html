<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departments - EMS</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div class="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">E</div><div><h2>EMS</h2><p>Management Portal</p></div></div>
    <nav class="sidebar-nav">
        <div class="nav-section-title">Main</div>
        <a href="/dashboard"><span class="nav-icon">&#127968;</span> Dashboard</a>
        <a href="/employees"><span class="nav-icon">&#128101;</span> Employees</a>
        <a href="/attendance"><span class="nav-icon">&#128197;</span> Attendance</a>
        <a href="/leave"><span class="nav-icon">&#128203;</span> Leave</a>
        <a href="/departments" class="active"><span class="nav-icon">&#127970;</span> Departments</a>
        <div class="nav-section-title">Reports</div>
        <a href="/downloadEmployees"><span class="nav-icon">&#128196;</span> Export PDF</a>
    </nav>
    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit">&#128682; Logout</button>
        </form>
    </div>
</div>

<div class="main">
    <div class="topbar">
        <div class="topbar-left"><h1>Departments</h1><p>Manage company departments</p></div>
        <div class="topbar-right"><button class="dark-toggle" onclick="toggleDarkMode()">&#127769;</button></div>
    </div>

    <div class="page-content">
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <!-- Add Department -->
        <div class="form-card" style="max-width:500px;margin-bottom:20px;">
            <h3 class="form-title">&#127970; Add New Department</h3>
            <form th:action="@{/departments/save}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label>Department Name *</label>
                    <input type="text" name="name" class="form-control" placeholder="e.g. Human Resources" required>
                </div>
                <button type="submit" class="btn-submit">&#10133; Add Department</button>
            </form>
        </div>

        <!-- Departments Table -->
        <div class="table-card">
            <div class="table-header">
                <h3>&#127970; All Departments</h3>
                <span style="font-size:13px;color:#888;" th:text="${departments.size()} + ' departments'">0</span>
            </div>
            <table>
                <thead><tr><th>#</th><th>Department Name</th><th>Employees</th></tr></thead>
                <tbody>
                    <tr th:each="dept,i : ${departments}">
                        <td th:text="${i.count}">1</td>
                        <td>
                            <div style="display:flex;align-items:center;gap:10px;">
                                <div style="width:36px;height:36px;background:linear-gradient(135deg,#1abc9c,#16a085);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;">&#127970;</div>
                                <span style="font-weight:600;" th:text="${dept.name}">-</span>
                            </div>
                        </td>
                        <td>
                            <span th:text="${empCountMap != null and empCountMap[dept.name] != null} ? ${empCountMap[dept.name]} + ' employees' : '-'">-</span>
                        </td>
                    </tr>
                    <tr th:if="${departments.isEmpty()}">
                        <td colspan="3" class="empty-cell">No departments found. Add one above.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script th:src="@{/js/dashboard.js}"></script>
</body>
</html>
