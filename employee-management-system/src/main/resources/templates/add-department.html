<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Department — EMS</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="sidebar-logo">
        <div class="logo-icon">E</div>
        <div><h2>EMS</h2><p>Management Portal</p></div>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section-title">Main</div>
        <a href="/dashboard"><span class="nav-icon">🏠</span> Dashboard</a>
        <a href="/employees"><span class="nav-icon">👥</span> Employees</a>
        <a href="/attendance"><span class="nav-icon">📅</span> Attendance</a>
        <a href="/leave"><span class="nav-icon">📋</span> Leave Requests</a>
        <a href="/departments" class="active"><span class="nav-icon">🏢</span> Departments</a>
        <div class="nav-section-title">Reports</div>
        <a href="/downloadEmployees"><span class="nav-icon">📄</span> Export PDF</a>
    </nav>
    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit"><span>🚪</span> Logout</button>
        </form>
    </div>
</div>

<!-- MAIN -->
<div class="main">
    <div class="topbar">
        <div class="topbar-left">
            <h1>Add Department</h1>
            <p>Create a new department</p>
        </div>
        <div class="topbar-right">
            <button class="dark-toggle" onclick="toggleDarkMode()">🌙</button>
            <a href="/departments" class="btn btn-danger" style="text-decoration:none;">← Back</a>
        </div>
    </div>

    <div class="page-content">
        <div class="form-card">
            <h3 class="form-title">🏢 New Department</h3>
            <form th:action="@{/departments/save}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label>Department Name *</label>
                    <input type="text" name="name" class="form-control" placeholder="e.g. Human Resources" required>
                </div>
                <button type="submit" class="btn-submit">➕ Save Department</button>
            </form>
        </div>
    </div>
</div>

<script th:src="@{/js/dashboard.js}"></script>
</body>
</html>
