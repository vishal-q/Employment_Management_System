<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - EMS</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div class="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">E</div><div><h2>EMS</h2><p>Management Portal</p></div></div>
    <nav class="sidebar-nav">
        <div class="nav-section-title">Main</div>
        <a href="/dashboard"><span class="nav-icon">&#127968;</span> Dashboard</a>
        <div sec:authorize="hasRole('ADMIN')"><a href="/employees"><span class="nav-icon">&#128101;</span> Employees</a></div>
        <a href="/attendance"><span class="nav-icon">&#128197;</span> Attendance</a>
        <a href="/leave"><span class="nav-icon">&#128203;</span> Leave</a>
        <div sec:authorize="hasRole('EMPLOYEE')"><a href="/my-profile"><span class="nav-icon">&#128100;</span> My Profile</a></div>
        <div class="nav-section-title">Communication</div>
        <a href="/announcements"><span class="nav-icon">&#128226;</span> Announcements</a>
        <a href="/messages"><span class="nav-icon">&#128140;</span> Messages</a>
        <a href="/tasks"><span class="nav-icon">&#9989;</span> Tasks</a>
        <a href="/wfh"><span class="nav-icon">&#127968;</span> Work From Home</a>
        <a href="/complaints"><span class="nav-icon">&#128226;</span> Complaints</a>
        <a href="/notifications" class="active"><span class="nav-icon">&#128276;</span> Notifications</a>
    </nav>
    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit">&#128682; Logout</button>
        </form>
    </div>
</div>

<div class="main">
    <div class="topbar">
        <div class="topbar-left">
            <h1>Notifications</h1>
            <p th:text="${unreadCount} + ' unread notifications'">0 unread</p>
        </div>
        <div class="topbar-right">
            <button class="dark-toggle" onclick="toggleDarkMode()">&#127769;</button>
            <form th:action="@{/notifications/markRead}" method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-primary">Mark All Read</button>
            </form>
        </div>
    </div>

    <div class="page-content">
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <div th:each="n : ${notifications}" class="table-card" style="margin-bottom:12px;"
             th:classappend="${!n.read} ? 'unread-notif' : ''">
            <div style="padding:16px 22px;display:flex;align-items:flex-start;gap:16px;">
                <!-- Icon by type -->
                <div style="width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;"
                     th:classappend="${n.type == 'SUCCESS'} ? 'notif-success' :
                                     (${n.type == 'WARNING'} ? 'notif-warning' :
                                     (${n.type == 'MESSAGE'} ? 'notif-message' :
                                     (${n.type == 'TASK'} ? 'notif-task' :
                                     (${n.type == 'WFH'} ? 'notif-wfh' : 'notif-info'))))">
                    <span th:if="${n.type == 'SUCCESS'}">&#9989;</span>
                    <span th:if="${n.type == 'WARNING'}">&#9888;</span>
                    <span th:if="${n.type == 'MESSAGE'}">&#128140;</span>
                    <span th:if="${n.type == 'TASK'}">&#128203;</span>
                    <span th:if="${n.type == 'WFH'}">&#127968;</span>
                    <span th:if="${n.type == 'LEAVE'}">&#128197;</span>
                    <span th:unless="${n.type == 'SUCCESS' or n.type == 'WARNING' or n.type == 'MESSAGE' or n.type == 'TASK' or n.type == 'WFH' or n.type == 'LEAVE'}">&#128276;</span>
                </div>
                <div style="flex:1;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
                        <strong th:text="${n.title}">Title</strong>
                        <div style="display:flex;align-items:center;gap:8px;">
                            <span th:unless="${n.read}" class="badge badge-rejected" style="font-size:10px;">NEW</span>
                            <span style="font-size:12px;color:#aaa;" th:text="${n.createdAt}">-</span>
                        </div>
                    </div>
                    <p style="margin:0;color:#555;font-size:14px;" th:text="${n.message}">Message</p>
                    <p style="margin:6px 0 0;font-size:12px;color:#aaa;">From: <strong th:text="${n.fromName}">-</strong></p>
                    <a th:if="${n.link != null}" th:href="${n.link}"
                       style="font-size:12px;color:#667eea;font-weight:600;text-decoration:none;">View Details &#8594;</a>
                </div>
            </div>
        </div>

        <div th:if="${notifications.isEmpty()}" class="table-card">
            <div class="empty-cell">No notifications yet.</div>
        </div>
    </div>
</div>
<script th:src="@{/js/dashboard.js}"></script>
</body>
</html>
