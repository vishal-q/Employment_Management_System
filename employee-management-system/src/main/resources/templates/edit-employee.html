<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Employee - EMS</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div class="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">E</div><div><h2>EMS</h2><p>Management Portal</p></div></div>
    <nav class="sidebar-nav">
        <div class="nav-section-title">Main</div>
        <a href="/dashboard"><span class="nav-icon">&#127968;</span> Dashboard</a>
        <a href="/employees" class="active"><span class="nav-icon">&#128101;</span> Employees</a>
        <a href="/attendance"><span class="nav-icon">&#128197;</span> Attendance</a>
        <a href="/leave"><span class="nav-icon">&#128203;</span> Leave</a>
        <a href="/departments"><span class="nav-icon">&#127970;</span> Departments</a>
    </nav>
    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit">&#128682; Logout</button>
        </form>
    </div>
</div>

<div class="main">
    <div class="topbar">
        <div class="topbar-left"><h1>Edit Employee</h1><p>Update employee information</p></div>
        <div class="topbar-right">
            <button class="dark-toggle" onclick="toggleDarkMode()">&#127769;</button>
            <a href="/employees" class="btn btn-danger" style="text-decoration:none;">&#8592; Back</a>
        </div>
    </div>

    <div class="page-content">
        <form th:action="@{/employees/update}" th:object="${employee}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" th:field="*{id}"/>
            <input type="hidden" th:field="*{userId}"/>
            <input type="hidden" th:field="*{sickLeaveBalance}"/>
            <input type="hidden" th:field="*{casualLeaveBalance}"/>
            <input type="hidden" th:field="*{earnedLeaveBalance}"/>

            <!-- Personal -->
            <div class="form-card" style="margin-bottom:20px;">
                <h3 class="form-title">&#128100; Personal Information</h3>
                <div class="form-row">
                    <div class="form-group"><label>Full Name *</label><input type="text" th:field="*{name}" class="form-control" required></div>
                    <div class="form-group"><label>Email *</label><input type="email" th:field="*{email}" class="form-control" required></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Phone</label><input type="text" th:field="*{phone}" class="form-control"></div>
                    <div class="form-group"><label>Gender</label>
                        <select th:field="*{gender}" class="form-control">
                            <option value="">Select</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Date of Birth</label><input type="date" th:field="*{dateOfBirth}" class="form-control"></div>
                    <div class="form-group"><label>Blood Group</label>
                        <select th:field="*{bloodGroup}" class="form-control">
                            <option value="">Select</option>
                            <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
                            <option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
                        </select>
                    </div>
                </div>
                <div class="form-group"><label>Address</label><input type="text" th:field="*{address}" class="form-control"></div>
            </div>

            <!-- Job -->
            <div class="form-card" style="margin-bottom:20px;">
                <h3 class="form-title">&#128188; Job Information</h3>
                <div class="form-row">
                    <div class="form-group"><label>Department</label>
                        <select th:field="*{department}" class="form-control">
                            <option value="">Select</option>
                            <option th:each="d : ${departments}" th:value="${d.name}" th:text="${d.name}">Dept</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Position</label><input type="text" th:field="*{position}" class="form-control"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Date of Joining</label><input type="date" th:field="*{dateOfJoining}" class="form-control"></div>
                    <div class="form-group"><label>Employment Type</label>
                        <select th:field="*{employmentType}" class="form-control">
                            <option value="Full-Time">Full-Time</option>
                            <option value="Part-Time">Part-Time</option>
                            <option value="Contract">Contract</option>
                            <option value="Intern">Intern</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Status</label>
                        <select th:field="*{status}" class="form-control">
                            <option value="Active">Active</option>
                            <option value="Inactive">Inactive</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Employee Code</label><input type="text" th:field="*{employeeCode}" class="form-control"></div>
                </div>
            </div>

            <!-- Salary -->
            <div class="form-card" style="margin-bottom:20px;">
                <h3 class="form-title">&#128176; Salary</h3>
                <div class="form-row">
                    <div class="form-group"><label>Basic Salary (Rs.)</label><input type="number" th:field="*{basicSalary}" class="form-control" min="0"></div>
                    <div class="form-group"><label>Allowances (Rs.)</label><input type="number" th:field="*{allowances}" class="form-control" min="0"></div>
                    <div class="form-group"><label>Total Salary (Rs.)</label><input type="number" th:field="*{salary}" class="form-control" min="0"></div>
                </div>
            </div>

            <button type="submit" class="btn-submit">&#10003; Update Employee</button>
        </form>
    </div>
</div>
<script th:src="@{/js/dashboard.js}"></script>
</body>
</html>
